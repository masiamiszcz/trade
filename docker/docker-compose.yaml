services:
  # Database Layer - accessible only to backend
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: trading-sql
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_MEMORY_LIMIT_MB: "2048"
      # Disable volume permissions issue on Docker Desktop by using in-memory tempdb
      MSSQL_ENABLE_HADR: "0"
    # NO PORT EXPOSURE - only internal network
    networks:
      - backend-sql
    # Removed volumes to fix permissions issue on Docker Desktop Windows
    # Data will be ephemeral - OK for testing
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Application Backend - accessible only to nginx, communicates with SQL
  backend:
    build:
      context: ../backend
      dockerfile: TradingPlatform.Api/Dockerfile
    container_name: trading-backend
    environment:
      ASPNETCORE_URLS: "http://+:5001"
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=TradingDB;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Issuer: "TradingPlatform"
      Jwt__Audience: "TradingPlatformUsers"
      Jwt__Key: "ThisIsAVerySecureSecretKeyForJwtTokenGenerationMinimum32Characters!"
      Jwt__ExpiryMinutes: "60"
    # NO PORT EXPOSURE - only internal networks
    depends_on:
      sqlserver:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - backend-sql
      - backend-nginx
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Web Application - accessible only to nginx
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: trading-frontend
    # NO PORT EXPOSURE - only internal network
    networks:
      - frontend-nginx
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Cache Layer for 2FA sessions - accessible only to backend
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    # NO PORT EXPOSURE - only internal network
    networks:
      - backend-nginx
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Reverse Proxy - ONLY exposed port (80)
  nginx:
    image: nginx:alpine
    container_name: trading-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - frontend-nginx
      - backend-nginx
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Three separate networks for security isolation
networks:
  # Frontend communicates with Nginx only
  frontend-nginx:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

  # Backend communicates with Nginx only
  backend-nginx:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

  # Backend communicates with SQL only
  backend-sql:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

volumes:
  mssql_data:
    driver: local
  mssql_log:
    driver: local