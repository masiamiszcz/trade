services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: trading-sql
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - trading-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  backend:
    build:
      context: ../backend
      dockerfile: TradingPlatform.Api/Dockerfile
    container_name: trading-backend
    environment:
      ASPNETCORE_URLS: "http://+:5001"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=TradingDB;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5001:5001"
    networks:
      - trading-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  trading-net:
    driver: bridge