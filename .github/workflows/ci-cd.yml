name: CI

on:
  pull_request:

jobs:
  docker-compose-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build and start containers
        run: docker compose -f docker/docker-compose.yaml up --build -d

      - name: Wait for backend container to be healthy
        shell: bash
        run: |
          echo "Waiting for backend container health..."
          for i in {1..60}; do
            if curl -f http://localhost:5001/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              exit 0
            fi
            
            echo "Attempt $i: Backend not ready yet..."
            sleep 5
          done

          echo "Backend failed to become healthy"
          docker compose -f docker/docker-compose.yaml logs trading-backend
          exit 1

      - name: Validate API response
        shell: bash
        run: |
          echo "Calling API..."
          RESPONSE=$(curl --fail http://localhost:5001/health)

          echo "Response: $RESPONSE"

          echo "$RESPONSE" | grep -q "Healthy"
          echo "$RESPONSE" | grep -q "databaseHealthy"

      - name: Show logs (always)
        if: always()
        run: docker compose -f docker/docker-compose.yaml logs

      - name: Shutdown containers
        if: always()
        run: docker compose -f docker/docker-compose.yaml down -v